name: Build and Deploy Email Delivery Backend

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker image tag (e.g. v1.0.0.1)"
        required: true
        type: string

env:
  DOCKER_REPO: ingressgroup
  IMAGE_NAME: email-delivery-backend
  ENV_KEY: BACKEND_IMAGE
  COMPOSE_FILE: docker-compose.prod.yml
  COMPOSE_SERVICE: backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$TAG" =~ ^v ]]; then
            echo "Tag must start with 'v' (got: $TAG)" >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using tag: $TAG"

      - name: Configure Docker Hub credentials
        run: |
          {
            echo "dockerHubUsername=${{ secrets.DOCKERHUB_USERNAME }}"
            echo "dockerHubPassword=${{ secrets.DOCKERHUB_TOKEN }}"
            echo "dockerRepoUrl=${{ env.DOCKER_REPO }}"
          } >> gradle.properties

      - name: Build and push Docker image
        run: |
          chmod +x scripts/build-and-push.sh
          ./scripts/build-and-push.sh \
            -Command email-delivery-backend-build-push \
            -Tag "${{ steps.meta.outputs.tag }}"

      - name: Deploy backend on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DOCKER_REPO: ${{ env.DOCKER_REPO }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          ENV_KEY: ${{ env.ENV_KEY }}
          COMPOSE_FILE: ${{ env.COMPOSE_FILE }}
          COMPOSE_SERVICE: ${{ env.COMPOSE_SERVICE }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          envs: TAG,DEPLOY_PATH,DOCKER_REPO,IMAGE_NAME,ENV_KEY,COMPOSE_FILE,COMPOSE_SERVICE
          script_stop: true
          command_timeout: 10m
          script: |
            if [ -z "${DEPLOY_PATH:-}" ]; then
              if [ -n "${HOME:-}" ] && [ -d "${HOME}/email-delivery" ]; then
                DEPLOY_PATH="${HOME}/email-delivery"
              else
                echo "DEPLOY_PATH secret is not set and ${HOME:-HOME}/email-delivery does not exist." >&2
                exit 1
              fi
            fi

            TAG="${TAG:?TAG is required}"
            DOCKER_REPO="${DOCKER_REPO:-ingressgroup}"
            IMAGE_NAME="${IMAGE_NAME:?IMAGE_NAME is required}"
            ENV_KEY="${ENV_KEY:?ENV_KEY is required}"
            COMPOSE_FILE="${COMPOSE_FILE:-docker-compose.prod.yml}"
            COMPOSE_SERVICE="${COMPOSE_SERVICE:?COMPOSE_SERVICE is required}"

            IMAGE="${DOCKER_REPO}/${IMAGE_NAME}:${TAG}"
            ENV_FILE="${DEPLOY_PATH}/.env"

            echo "Deploy user: $(whoami)"
            echo "Deploy path: ${DEPLOY_PATH}"
            echo "Image: ${IMAGE}"

            if [ ! -d "$DEPLOY_PATH" ]; then
              echo "Deploy path not found: $DEPLOY_PATH" >&2
              exit 1
            fi

            if [ ! -f "$ENV_FILE" ]; then
              echo ".env not found: $ENV_FILE" >&2
              exit 1
            fi

            if [ ! -f "${DEPLOY_PATH}/${COMPOSE_FILE}" ]; then
              echo "Compose file not found: ${DEPLOY_PATH}/${COMPOSE_FILE}" >&2
              exit 1
            fi

            cd "$DEPLOY_PATH"

            if grep -q "^${ENV_KEY}=" "$ENV_FILE"; then
              sed -i "s|^${ENV_KEY}=.*|${ENV_KEY}=${IMAGE}|" "$ENV_FILE"
            else
              echo "${ENV_KEY}=${IMAGE}" >> "$ENV_FILE"
            fi

            echo "${ENV_KEY} set to ${IMAGE}"

            if docker compose version >/dev/null 2>&1; then
              docker compose -f "$COMPOSE_FILE" pull "$COMPOSE_SERVICE"
              docker compose -f "$COMPOSE_FILE" up -d "$COMPOSE_SERVICE"
              docker compose -f "$COMPOSE_FILE" ps "$COMPOSE_SERVICE"
            elif command -v docker-compose >/dev/null 2>&1; then
              docker-compose -f "$COMPOSE_FILE" pull "$COMPOSE_SERVICE"
              docker-compose -f "$COMPOSE_FILE" up -d "$COMPOSE_SERVICE"
              docker-compose -f "$COMPOSE_FILE" ps "$COMPOSE_SERVICE"
            else
              echo "docker compose is not installed on the server" >&2
              exit 1
            fi

            echo "Deploy finished for ${IMAGE}"
