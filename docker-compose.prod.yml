services:
  db:
    image: mysql:8.0
    container_name: email-delivery-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?set-db-root-password}
      MYSQL_ROOT_HOST: ${MYSQL_ROOT_HOST:-localhost}
      MYSQL_DATABASE: ${DB_NAME:-email_delivery}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - email-delivery-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    image: ${BACKEND_IMAGE:-ingressgroup/email-delivery-backend:v1.0.0.0}
    build: .
    container_name: email-delivery-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_HOST_PORT:-8092}:8090"
    environment:
      PORT: 8090
      DB_CONNECTION_IP: db
      DB_CONNECTION_PORT: 3306
      DB_NAME: ${DB_NAME:-email_delivery}
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?set-db-root-password}
      APP_SECRET_KEY: ${APP_SECRET_KEY:?set-app-secret-key}
      ADMIN_BOOTSTRAP_ENABLED: ${ADMIN_BOOTSTRAP_ENABLED:-true}
      ADMIN_BOOTSTRAP_EMAIL: ${ADMIN_BOOTSTRAP_EMAIL:-}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:-}
      ADMIN_BOOTSTRAP_FIRST_NAME: ${ADMIN_BOOTSTRAP_FIRST_NAME:-Admin}
      ADMIN_BOOTSTRAP_LAST_NAME: ${ADMIN_BOOTSTRAP_LAST_NAME:-User}
      ADMIN_PUBLIC_BASE_URL: ${ADMIN_PUBLIC_BASE_URL:-http://localhost:8092}
      ADMIN_CORS_ALLOWED_ORIGIN_PATTERNS: ${ADMIN_CORS_ALLOWED_ORIGIN_PATTERNS:-http://localhost:*,http://127.0.0.1:*}
      ADMIN_CORS_MAX_AGE_SECONDS: ${ADMIN_CORS_MAX_AGE_SECONDS:-3600}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_SAME_SITE: ${COOKIE_SAME_SITE:-Lax}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      ADMIN_MAIL_FROM: ${ADMIN_MAIL_FROM:-}
      SPRINGDOC_API_DOCS_ENABLED: ${SPRINGDOC_API_DOCS_ENABLED:-false}
      SPRINGDOC_SWAGGER_UI_ENABLED: ${SPRINGDOC_SWAGGER_UI_ENABLED:-false}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - email-delivery-network

  frontend:
    image: ${FRONTEND_IMAGE:-ingressgroup/email-delivery-frontend:v1.0.0.0}
    build:
      context: ../email-delivery-ui
      dockerfile: Dockerfile
      args:
        VITE_ADMIN_API_URL: ${VITE_ADMIN_API_URL:-http://localhost:8092/admin/v1}
    container_name: email-delivery-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_HOST_PORT:-8093}:80"
    depends_on:
      backend:
        condition: service_started
    networks:
      - email-delivery-network

volumes:
  db_data:
    driver: local

networks:
  email-delivery-network:
    driver: bridge
