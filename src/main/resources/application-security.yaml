security:
  jwtProperties:
    # Shared with stay-board (PMS) and stay-board-rms so a single business-owner token works everywhere.
    secret: ${APP_SECRET_KEY:}
  cookie:
    secure: ${COOKIE_SECURE:false}
    same-site: ${COOKIE_SAME_SITE:Lax}

admin:
  cors:
    allowed-origin-patterns: ${ADMIN_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,http://65.21.51.215:8022,http://65.21.51.215:8023}
    max-age-seconds: ${ADMIN_CORS_MAX_AGE_SECONDS:3600}
